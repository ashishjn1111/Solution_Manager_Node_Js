        updateStatus('Manual RAG upload successful.');
      } catch (e) {
        await addMessage(`❌ Manual RAG upload error: ${e?.message ?? e}`,'error',[],true);
        updateStatus('Manual RAG upload failed.', true);
      }
    }

    // ===== Full chat export / file ops =====
    function getChatData() {
      const els = Array.from(chatBox.querySelectorAll('.user-message,.bot-message'));
      const out = []; const now = new Date().toLocaleString();
      for (let i=els.length-1;i>=0;i--){
        const m = els[i];
        if (m.classList.contains('status-message') || m.classList.contains('document-card')) continue;
        const sender = m.classList.contains('user-message') ? 'user' : 'bot';
        const text = sender==='user' ? (m.querySelector('p')?.textContent||'') : (m.querySelector('.message-text')?.textContent||'');
        let sources = null;
        const meta = m.querySelector('.metadata-container');
        if (sender==='bot' && meta) {
          const links = Array.from(meta.querySelectorAll('.metadata-source a'));
          sources = links.slice(0, MAX_SOURCES).map(a => {
            const t = a.textContent || '';
            const mm = t.match(/\(p\. (\d+)\)$/);
            const page = mm ? mm[1] : 'N/A';
            return t.includes('(p.') ? {source: t.replace(/\s\(p\. \d+\)$/,''), page} : {title: t, url: a.href};
          });
        }
        out.push({ sender, text, sources, mode:'current_chat_view', timestamp: now });
      }
      return out.reverse();
    }

    async function exportChat(format) {
      const data = getChatData();
      if (data.length===0) { await addMessage('❌ Cannot export empty chat.','error',[],true); updateStatus('Export failed: Empty chat.', true); return; }
      const slug = lastUserQuery ? lastUserQuery.trim().toLowerCase().replace(/[^a-z0-9\s]/g,'').slice(0,20).trim().replace(/\s+/g,'_') : 'chat_export';
      const suggested = `${slug || 'chat_export'}_${Date.now()}`;
      let nameNoExt = prompt('Enter filename (without extension):', suggested);
      if (nameNoExt===null || nameNoExt.trim()===''){ updateStatus('Export cancelled.', true); return; }
      nameNoExt = nameNoExt.trim().replace(/[^a-z0-9\s-_]/gi,'_');

      updateStatus(`Preparing full chat export to ${format.toUpperCase()}...`);
      const r = await fetch(`${SERVER_URL}/export-chat/${format}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ chatData: data }) });
      if (!r.ok) {
        const j = await r.json().catch(()=>({error:r.statusText}));
        await addMessage(`❌ Full chat ${format.toUpperCase()} failed. Server Error: ${j.error ?? r.statusText}`,'error',[],true);
        updateStatus('Export failed.', true); return;
      }
      const blob = await r.blob(); const url = URL.createObjectURL(blob);
      const finalExt = mapFormatToExt(format); const fileName = `${nameNoExt}.${finalExt}`;

      const isDark = document.body.classList.contains('dark-mode');
      const isView = canViewInBrowser(finalExt);
      const icon = getIconForFileType(finalExt);

      const card = document.createElement('div');
      card.classList.add('document-card','mt-4'); if (isDark) card.classList.add('dark-mode');
      card.dataset.export='true'; card.dataset.fileName=fileName; card.dataset.blobUrl=url; card.dataset.format=finalExt;

      const iconDiv = document.createElement('div'); iconDiv.classList.add('document-card-img'); iconDiv.innerHTML = icon;
      const actions = document.createElement('div'); actions.classList.add('doc-actions-container');

      if (isView) { const v = document.createElement('a'); v.href=url; v.target="_blank"; v.classList.add('doc-action-btn','btn-view'); v.textContent="View 👁️"; actions.appendChild(v); }
      const dl = document.createElement('a'); dl.href=url; dl.download=fileName; dl.classList.add('doc-action-btn','btn-view'); dl.textContent="Download ⬇️"; actions.appendChild(dl);
      const analyzeBtn = document.createElement('button'); analyzeBtn.classList.add('doc-action-btn','btn-analyze'); analyzeBtn.dataset.action='upload-export'; analyzeBtn.dataset.blobUrl=url; analyzeBtn.dataset.filename=fileName; analyzeBtn.dataset.format=finalExt; analyzeBtn.textContent='Analyze/RAG 🧠'; actions.appendChild(analyzeBtn);
      const delBtn = document.createElement('button'); delBtn.classList.add('doc-action-btn','btn-delete'); delBtn.dataset.action='delete-card'; delBtn.dataset.filename=fileName; delBtn.textContent='Delete ❌'; actions.appendChild(delBtn);

      const title = document.createElement('div'); title.classList.add('document-card-title','text-sm'); title.textContent = `Full Chat Export: ${fileName}`;
      if (isDark) title.classList.add('dark-mode');

      card.appendChild(iconDiv); card.appendChild(title); card.appendChild(actions);
      chatBox.prepend(card);

      updateStatus(`Full chat export ready: ${fileName}`);
    }

    function renderHistory() {
      historyContent.innerHTML = '';
      if (conversationHistory.length===0) { historyContent.innerHTML = '<p class="text-center text-gray-500 pt-8">No conversation history yet. Start chatting!</p>'; return; }
      conversationHistory.forEach((item, idx) => {
        const it = document.createElement('div'); it.classList.add('history-item'); if (document.body.classList.contains('dark-mode')) it.classList.add('dark-mode'); it.dataset.index=idx;
        const q = document.createElement('div'); q.classList.add('history-item-query'); q.textContent = `${item.mode==='documents'?'📄':(item.mode==='servicenow'?'⚙️':'🌐')} ${item.query}`;
        const r = document.createElement('div'); r.classList.add('history-item-response'); r.textContent = (item.response||'').substring(0,100)+'...';
        const ts = document.createElement('span'); ts.classList.add('text-xs','text-gray-400','block','mt-1'); ts.textContent = item.timestamp;
        it.appendChild(q); it.appendChild(r); it.appendChild(ts);
        it.addEventListener('click', ()=>{ chatBox.innerHTML=''; addMessage(item.query,'user',[],false,item.mode); addMessage(item.response,'bot',item.sources,false,item.mode); updateStatus('Loaded conversation from history.'); });
        historyContent.appendChild(it);
      });
    }

    function populateLanguageDropdown() {
      const map = { en:'English 🇬🇧', es:'Español 🇪🇸', fr:'Français 🇫🇷', de:'Deutsch 🇩🇪', ja:'日本語 🇯🇵', ko:'한국어 🇰🇷', ru:'Русский 🇷🇺', zh:'中文 🇨🇳', ar:'العربية 🇸🇦', hi:'हिंदी 🇮🇳', tl:'Filipino 🇵🇭' };
      languageSelect.innerHTML = ''; Object.entries(map).forEach(([v,l])=>{ const o=document.createElement('option'); o.value=v; o.textContent=l; if(v==='en') o.selected=true; languageSelect.appendChild(o); });
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
      document.querySelectorAll('.chat-container,#sidebar,#sidebar-header,.input-area,.controls,#status-bar,.deltek-header,#user-input,#chat-box,#history-content,.document-card,#modal-content,#ac-dropdown').forEach(el=>el.classList.toggle('dark-mode', isDark));
      document.querySelectorAll('.document-card-title').forEach(el=>el.classList.toggle('dark-mode', isDark));
      if (nlpIndicator.classList.contains('active')) nlpIndicator.classList.toggle('dark-mode', isDark);
      document.querySelectorAll('.message').forEach(el=>{ el.classList.toggle('dark-mode', isDark); if (el.querySelector('.metadata-container')) el.querySelector('.metadata-container').classList.toggle('dark-mode', isDark); });
      updateStatus('Dark mode toggled.');
      renderHistory();
    }

    function handleFontSizeChange(e){ document.body.style.fontSize = `${e.target.value}px`; updateStatus(`Font size set to ${e.target.value}px.`); }

    async function handleFileUpload(files) {
      if (!files || files.length===0) return;
      await addMessage(`🚀 Uploading and processing **${files.length}** document(s)...`,'bot',[],true); updateStatus(`Uploading ${files.length} file(s)...`);
      const fd = new FormData();
      for (const f of files) {
        const ext = (f.name.split('.').pop() || '').toLowerCase();
        if (!['pdf','json','txt','csv','doc','docx','ppt','pptx','xlsx'].includes(ext)) { await addMessage(`❌ Skipped **${f.name}**: Unsupported file type.`,'error',[],true); continue; }
        fd.append('document', f);
      }
      if (fd.getAll('document').length===0) { updateStatus('Upload failed: No valid files selected.', true); return; }
      uploadButton.disabled = true;
      try {
        const r = await fetch(`${SERVER_URL}/upload`, { method:'POST', body: fd });
        const j = await r.json().catch(()=>({error:r.statusText}));
        if (!r.ok) { await addMessage(`❌ Failed to process documents. Server Error: ${j.error ?? r.statusText}.`,'error',[],true); updateStatus('Upload failed: Server error.', true); return; }
        for (const f of fd.getAll('document')) addDocumentThumbnail(f.name);
        await addMessage('✅ Documents processed and RAG refreshed.','bot',[],true); updateStatus('Upload successful.');
      } catch { await addMessage('❌ Network error while uploading.','error',[],true); updateStatus('Upload failed: Connection error.', true); }
      finally { uploadButton.disabled = false; }
    }

    // ===== Modal open/close (centered) =====
    function openManualModal() {
      modal.classList.remove('hidden');
      modal.classList.add('show');
      if (document.body.classList.contains('dark-mode')) modalContent.classList.add('dark-mode'); else modalContent.classList.remove('dark-mode');
      analysisSubject.focus();
    }
    function closeManualModal() {
      modal.classList.add('hidden');
      modal.classList.remove('show');
    }

    async function handleManualAnalysis() {
      const subject = analysisSubject.value.trim();
      const body = analysisBody.value.trim();
      if (!subject || !body) { analysisError.textContent = 'Subject and Body are required.'; analysisError.classList.remove('hidden'); return; }
      analysisError.classList.add('hidden');

      const safe = subject.toLowerCase().replace(/[^a-z0-9\s-_]/g,'').slice(0,50).trim().replace(/\s+/g,'_');
      const fileName = `${safe || 'manual_text'}_${Date.now()}.txt`;

      const card = document.createElement('div'); card.classList.add('document-card','mt-4'); if (document.body.classList.contains('dark-mode')) card.classList.add('dark-mode');
      const iconDiv = document.createElement('div'); iconDiv.classList.add('document-card-img'); iconDiv.innerHTML = '🗒️';
      const title = document.createElement('div'); title.classList.add('document-card-title','text-sm'); title.textContent = `Manual Text: ${fileName}`;
      const actions = document.createElement('div'); actions.classList.add('doc-actions-container');

      const analyze = document.createElement('button'); analyze.classList.add('doc-action-btn','btn-analyze'); analyze.dataset.action='upload-manual-rag'; analyze.dataset.filename=fileName; analyze.dataset.fileContent = encodeURIComponent(body); analyze.textContent = 'Analyze/RAG 🧠'; actions.appendChild(analyze);
      const del = document.createElement('button'); del.classList.add('doc-action-btn','btn-delete'); del.dataset.action='delete-card'; del.dataset.filename=fileName; del.textContent='Delete ❌'; actions.appendChild(del);

      card.appendChild(iconDiv); card.appendChild(title); card.appendChild(actions);
      chatBox.prepend(card);

      closeManualModal();
      updateStatus('Manual text card created. Click Analyze/RAG to index.');
    }

    // ===== Event wiring =====
    function setupEventListeners() {
      sendButton.addEventListener('click', () => { closeAcDropdown(); sendMessage(); });
      userInput.addEventListener('keydown', handleInputKeydown);
      userInput.addEventListener('input', handleInputForAC);
      userInput.addEventListener('focus', () => {
        const text = userInput.value.trim();
        if (text.length >= 2) handleInputForAC(null);
      });

      // Voice search
      voiceButton.addEventListener('click', toggleVoice);

      manualAnalysisButton.addEventListener('click', openManualModal);
      modalCloseButton.addEventListener('click', closeManualModal);
      modalAnalyzeButton.addEventListener('click', handleManualAnalysis);

      uploadButton.addEventListener('click', ()=> fileInput.click());
      fileInput.addEventListener('change', e=> handleFileUpload(e.target.files));

      darkModeToggle.addEventListener('click', toggleDarkMode);
      fontSizeSelect.addEventListener('change', handleFontSizeChange);
      clearHistoryButton.addEventListener('click', async ()=>{
        if (!confirm("Clear your local conversation history (sidebar)?")) return;
        conversationHistory = []; localStorage.removeItem('conversationHistory'); renderHistory(); updateStatus('Local conversation history cleared.');
      });

      newChatButton.addEventListener('click', async ()=>{
        if (!confirm('Start a new chat? (Chat view will be cleared)')) return;
        await clearChat(false); updateStatus('New chat started.');
      });

      // Export toolbar
      exportPdfButton.addEventListener('click', ()=> exportChat('pdf'));
      exportWordButton.addEventListener('click', ()=> exportChat('word'));
      exportXlsxButton.addEventListener('click', ()=> exportChat('xlsx'));
      exportPptButton.addEventListener('click', ()=> exportChat('ppt'));
      exportTxtButton.addEventListener('click', ()=> exportChat('txt'));
      exportCsvButton.addEventListener('click', ()=> exportChat('csv'));

      // Message-area delegation
      chatBox.addEventListener('click', e=>{
        const tBtn = e.target.closest('.translate-btn');
        const rBtn = e.target.closest('.translate-reset-btn');
        const act  = e.target.closest('[data-action]');

        if (tBtn) {
          const target = tBtn.dataset.lang;                      // e.g., "es"
          const label = LANG_LABELS[target] || target.toUpperCase();
          const msg = tBtn.closest('.bot-message');
          const textEl = msg.querySelector('.message-text');
          const resetBtn = msg.querySelector('.translate-reset-btn');
          const badge = msg.querySelector('[data-translated-badge]');
          const original = msg.dataset.originalText || textEl?.textContent || '';
          if (!original.trim()) { updateStatus('Nothing to translate.', true); return; }

          const allBtns = msg.querySelectorAll('.translate-btn');
          allBtns.forEach(b => b.disabled = true);
          updateStatus(`Translating to ${label}…`);

          translateMessageOnServer(original, target)
            .then(j => {
              const translated = (j.translated || '').trim();
              if (!translated) { updateStatus('Translation returned empty text.', true); return; }
              textEl.innerHTML = renderMarkdown(translated);
              if (resetBtn) resetBtn.style.display = 'inline-flex';
              if (badge) { badge.textContent = `Translated: ${label}`; badge.style.display = 'inline-flex'; }
              updateStatus(`Translated to ${label}.`);
            })
            .catch(err => {
              updateStatus(`Translation failed: ${err.message || err}`, true);
            })
            .finally(() => {
              allBtns.forEach(b => b.disabled = false);
            });

        } else if (rBtn) {
          const msg = rBtn.closest('.bot-message'); const textEl = msg.querySelector('.message-text'); const badge = msg.querySelector('[data-translated-badge]');
          textEl.innerHTML = renderMarkdown(msg.dataset.originalText || ''); rBtn.style.display='none'; if (badge) badge.style.display='none'; updateStatus('Translation reset to original.');
        } else if (act) {
          const action = act.dataset.action;
          if (action === 'delete-message') {
            if (confirm('Delete this message?')) act.closest('.message').remove();
          } else if (action === 'export-inline') {
            exportSingleMessage(act.closest('.message'), act.dataset.format);
          } else if (action === 'analyze-inline') {
            analyzeSingleMessageForRAG(act.closest('.message'));
          } else if (action === 'upload-export') {
            const card = act.closest('.document-card'); fetch(act.dataset.blobUrl).then(r=>r.blob()).then(b=> uploadExportedFileForRAG(b, act.dataset.filename, card));
          } else if (action === 'delete-card') {
            const card = act.closest('.document-card'); if (confirm('Remove this card from view? (File remains on disk until Clear Exports)')) { card.remove(); updateStatus('Card removed.'); }
          } else if (action === 'delete-rag-doc') {
            deleteDocument(act.dataset.filename, act.closest('.document-card'));
          } else if (action === 'upload-manual-rag') {
            const card = act.closest('.document-card'); const fileName = act.dataset.filename; const content = decodeURIComponent(act.dataset.fileContent);
            uploadManualRAG(content, fileName, card);
          }
        }
      });
    }

    async function deleteDocument(fileName, card) {
      if (!confirm(`Delete RAG document ${fileName}? This refreshes the index.`)) return false;
      updateStatus(`Deleting ${fileName} and refreshing RAG index...`);
      try {
        const r = await fetch(`${SERVER_URL}/delete-document`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ filename:fileName }) });
        if (!r.ok) { const j = await r.json().catch(()=>({error:r.statusText})); await addMessage(`❌ Deletion failed for ${fileName}. Error: ${j.error ?? 'Server error'}.`,'error',[],true); updateStatus('Document deletion failed.', true); return false; }
        await addMessage(`✅ Deleted RAG Document: **${fileName}**. Index refreshed.`,'bot',[],true);
        if (card) card.remove(); updateStatus('Document deleted and RAG index refreshed.'); return true;
      } catch {
        await addMessage(`❌ Network error while deleting document.`,'error',[],true);
        updateStatus('Document deletion failed: Connection error.', true); return false;
      }
    }





    async function clearHistory(){ if (!confirm("Clear your local conversation history (sidebar)?")) return; conversationHistory=[]; localStorage.removeItem('conversationHistory'); renderHistory(); updateStatus('Local conversation history cleared.'); }
    async function clearChat(initial=false){ chatBox.innerHTML=''; userInput.value=''; lastUserQuery=''; document.querySelectorAll('.document-card').forEach(c=>c.remove()); await addMessage("👋 Welcome to **Deltek Solution Manager**!\n\nAsk any question and I'll search across **Web**, **Documents**, and **ServiceNow** automatically.\n\n• Upload documents using the 📎 button\n• Use **SN Date Window** to filter ServiceNow by time\n• Export results in PDF, Word, Excel, and more",'bot'); if (!initial) updateStatus('Chat cleared (RAG data preserved).'); }
    async function startNewChat(){ if (!confirm('Start a new chat? (Chat view will be cleared)')) return; await clearChat(false); updateStatus('New chat started.'); }

    async function setupOnLoad() {
      if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
        document.querySelectorAll('#chat-box,#sidebar,#sidebar-header,#history-content,.input-area,#user-input,#status-bar,.deltek-header,.controls').forEach(el => el.classList.add('dark-mode'));
      }
      // Fetch SN base URL for record links
      try {
        const r = await fetch(`${SERVER_URL}/config/client`);
        if (r.ok) { const j = await r.json(); SN_BASE_URL = j.SN_BASE_URL || ''; }
      } catch(e) { console.warn('Could not fetch client config:', e); }

      // Fetch SN groups for filter dropdown
      try {
        const r = await fetch(`${SERVER_URL}/servicenow/groups`);
        if (r.ok) {
          const j = await r.json();
          _snGroups = (j.groups || []);
          renderGroupOptions('');
        }
      } catch(e) { console.warn('Could not fetch SN groups:', e); }

      // Configure marked for safe rendering
      if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true });
      }

      populateLanguageDropdown();
      setupEventListeners();
      initVoiceSearch();
      renderHistory();
      clearChat(true);
      updateStatus('Ready');
    }
    window.addEventListener('DOMContentLoaded', setupOnLoad);
  </script>
